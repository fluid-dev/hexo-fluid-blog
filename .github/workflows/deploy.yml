name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Download Branch
      uses: actions/checkout@v2

    - name: Update Submodule
      run: |
        git submodule init
        git submodule update --remote

    - name: Setup Node
      uses: actions/setup-node@v1
      with:
        node-version: "14.x"

    - name: Install NodeModules
      run: |
        rm -f .yarnclean yarn.lock
        yarn --non-interactive --silent
        yarn list --depth=0

    - name: Install Pandoc
      run: sudo apt-get install -y pandoc

    - name: Install Hexo Sitemap Plugin
      run: yarn add hexo-generator-seo-friendly-sitemap --dev

    - name: Find all sitemap plugins
      run: |
        yarn list --pattern "sitemap"
        echo "--- checking node_modules ---"
        ls -la node_modules | grep sitemap

    - name: Hexo Generate
      run: |
        rm -rf ./public
        yarn run hexo clean
        yarn run hexo generate

    - name: Turnstyle
      uses: softprops/turnstyle@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Hexo
      run: npm run build

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        publish_branch: gh-pages
        force_orphan: true
